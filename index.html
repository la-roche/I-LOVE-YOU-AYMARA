<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pour AYMARA ❤️</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= PAGE LOGIN ================= -->
<div id="loginPage" class="page active">
  <div class="login-box">
    <h2>💜 Qui es-tu ?</h2>

    <input type="text" id="nameInput" placeholder="Entre ton nom...">
    <input type="password" id="codeInput" placeholder="Code secret...">

    <button onclick="checkLogin()">Entrer ❤️</button>

    <p id="errorMsg"></p>
  </div>
</div>

<!-- ================= PAGE PRINCIPALE ================= -->
<div id="mainPage" class="page hidden">

  <h1 class="fade-in">Bienvenue mon Diamant Noir 💎</h1>

  <!-- 💡 PHOTO -->
  <!-- 👉 Remplace "photo.jpg" par ton image -->
  <img src="photo.jpg" alt="AYMARA" class="photo">

  <!-- 💖 MESSAGE -->
  <div class="love-text">
    <p>AYMARA, tu es la lumière dans mon obscurité 💜</p>
    <p>Chaque moment avec toi est un cadeau 💙</p>
    <p>Tu es belle, douce et unique ❤️</p>
    <p>Je t'aime infiniment - ROCHEFORT</p>
  </div>

  <!-- ❤️ COEURS -->
  <div class="hearts"></div>

  <!-- 🎵 MUSIQUE -->
  <!-- 👉 Remplace music.mp3 -->
  <audio controls autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- 💬 COMMENTAIRE -->
  <div class="comment-section">
    <h3>Laisse-moi un mot 💌</h3>
    <textarea id="commentInput" placeholder="Écris ici..."></textarea>
    <button onclick="addComment()">Envoyer</button>

    <div id="comments"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
